name: gladskin 
description: "A new Flutter project."  
publish_to: 'none'  
version: 0.1.0+2

environment:  
  sdk: ^3.11.0  

dependencies:  
  flutter:  
    sdk: flutter  
  go_router: ^17.1.0  
  pinput: ^4.0.0  
  flutter_animate: ^4.5.2  
  google_fonts: ^8.0.2  
  visibility_detector: ^0.4.0+2  
  firebase_core: ^3.15.0  
  cloud_firestore: 5.6.9  
  carousel_slider: ^5.1.2  
  firebase_auth: 5.6.0  
  lottie: ^3.3.2  
  firebase_remote_config: 5.4.5  
  firebase_remote_config_platform_interface: 1.5.5  
  firebase_remote_config_web: 1.8.5  
  flutter_launcher_icons: ^0.14.4  

dev_dependencies:  
  flutter_test:  
    sdk: flutter  
  flutter_lints: ^6.0.0  
  change_app_package_name: ^1.5.0  

flutter:  
  uses-material-design: true  

dependency_overrides:  
  firebase_core_platform_interface: 6.0.0  

flutter_launcher_icons:  
  android: true  
  ios: true  
  image_path: "assets/icon/app_icon.jpeg"