name: glowfit
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  go_router: ^17.1.0
  flutter_animate: ^4.5.2
  google_fonts: ^8.0.2
  visibility_detector: ^0.4.0+2
  shared_preferences: ^2.5.4
  firebase_core: ^4.5.0
  firebase_auth: ^6.3.0
  flutter_svg: ^2.2.4
  lottie: ^3.3.2
  cloud_firestore: ^6.2.0
  firebase_remote_config: ^6.3.0
  carousel_slider: ^5.1.2
  pinput: ^6.0.2
  intl: ^0.20.2
  cloud_functions: ^6.1.0
  razorpay_flutter: ^1.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
    
  flutter_lints: ^6.0.0
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/app-header.svg
    - assets/images/gladskin.png
    - assets/images/splashscreen/onlylogo.svg
    - assets/images/splashscreen/onlytext.svg
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Regular.ttf
        - asset: assets/fonts/Manrope-Medium.ttf
          weight: 500
        - asset: assets/fonts/Manrope-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Manrope-Bold.ttf
          weight: 700

    - family: NotoSerif
      fonts:
        - asset: assets/fonts/NotoSerif-Regular.ttf
        - asset: assets/fonts/NotoSerif-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSerif-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoSerif-Bold.ttf
          weight: 700

    - family: TenorSans
      fonts:
        - asset: assets/fonts/TenorSans-Regular.ttf